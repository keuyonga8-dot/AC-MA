<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐릭터 로스터</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f0e8;
    --border:   #d8d0c4;
    --text:     #2c2418;
    --text-mid: #6b5f4e;
    --text-dim: #a09080;
    --accent:   #7c5c3a;

    --row-sentinel: #3a3028;
    --row-guide:    #fdfaf5;

    --grade-ss: #c0392b;
    --grade-s:  #b8860b;
    --grade-a:  #2471a3;
    --grade-b:  #7d3c98;
    --grade-c:  #1e8449;

    --attr-불:    #d4502a;
    --attr-얼음:  #5ab8e8;   /* 하늘색 */
    --attr-풀:    #7ed44a;   /* 연두 초록 */
    --attr-물:    #2872c8;   /* 진한 파랑 */
    --attr-번개:  #c8a800;
    --attr-바람:  #2ec4a8;   /* 민트 (초록+파랑 사이) */
    --attr-무속성:#8a8a8a;
  }

  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    padding: 44px 44px 28px;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: flex-end; gap: 20px;
  }
  .header-title { font-size: 2rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; }
  .header-title span { color: var(--accent); }
  .header-count { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 3px; }

  /* ── CONTROLS ── */
  .controls {
    padding: 14px 44px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(245,240,232,0.96);
    backdrop-filter: blur(10px); z-index: 10;
  }
  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 220px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  input[type="text"] {
    width: 100%; background: #fdfaf5; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 34px; color: var(--text); font-size: 0.86rem; font-family: inherit; outline: none; transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  .filter-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .divider { width: 1px; height: 26px; background: var(--border); }

  .chip {
    padding: 4px 12px; border-radius: 20px; font-size: 0.76rem; font-weight: 500;
    border: 1.5px solid var(--border); background: #fdfaf5; color: var(--text-mid);
    cursor: pointer; transition: all .15s; font-family: inherit; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { color: #fff; border-color: transparent; }

  .chip[data-grade="ALL"].active  { background: var(--text); }
  .chip[data-grade="SS"].active   { background: var(--grade-ss); }
  .chip[data-grade="S"].active    { background: var(--grade-s); }
  .chip[data-grade="A"].active    { background: var(--grade-a); }
  .chip[data-grade="C"].active    { background: var(--grade-c); }

  .chip[data-org="ALL"].active        { background: var(--text); }
  .chip[data-org="아크프리마"].active { background: #8b2218; }
  .chip[data-org="뱅가드1팀"].active  { background: #5a3e2b; }
  .chip[data-org="뱅가드2팀"].active  { background: #7a4e2b; }
  .chip[data-org="하모니서포트부"].active { background: #2b5a4a; }
  .chip[data-org="하모니RST"].active  { background: #2b4a5a; }
  .chip[data-org="하모니코어팀"].active { background: #4a2b5a; }
  .chip[data-org="에이전트"].active   { background: var(--grade-a); }
  .chip[data-org="애콜라이트"].active  { background: var(--grade-c); }



  .chip[data-attr="ALL"].active     { background: var(--text); }
  .chip[data-attr="불"].active      { background: var(--attr-불); }
  .chip[data-attr="얼음"].active    { background: var(--attr-얼음); color:#001828; }
  .chip[data-attr="풀"].active      { background: var(--attr-풀); color:#0e2000; }
  .chip[data-attr="물"].active      { background: var(--attr-물); }
  .chip[data-attr="번개"].active    { background: var(--attr-번개); color:#1a1200; }
  .chip[data-attr="바람"].active    { background: var(--attr-바람); color:#001a18; }
  .chip[data-attr="무속성"].active  { background: var(--attr-무속성); }

  .legend { display: flex; gap: 14px; align-items: center; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text-dim); white-space: nowrap; }
  .legend-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }
  .legend-swatch.sentinel { background: var(--row-sentinel); }
  .legend-swatch.guide    { background: var(--row-guide); border: 1.5px solid var(--border); }

  /* ── TABLE ── */
  .table-wrap { padding: 20px 44px 52px; }
  .result-count { font-size: 0.74rem; color: var(--text-dim); margin-bottom: 10px; padding: 0 2px; }
  .result-count span { color: var(--accent); font-weight: 700; }

  table { width: 100%; border-collapse: separate; border-spacing: 0 5px; table-layout: fixed; }

  /* 컬럼 너비 */
  td:nth-child(1), th:nth-child(1) { width: 52px; }
  td:nth-child(2), th:nth-child(2) { width: 100px; }
  td:nth-child(3), th:nth-child(3) { width: 110px; overflow: hidden; text-overflow: ellipsis; }
  td:nth-child(4), th:nth-child(4) { width: 68px; }
  td:nth-child(5), th:nth-child(5) { width: 44px; }
  td:nth-child(6), th:nth-child(6) { width: 100px; }

  thead th {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: .09em;
    color: var(--text-dim); font-weight: 600; padding: 0 14px 6px;
    text-align: left; cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--accent); }
  thead th .sort-icon { margin-left: 3px; opacity: .35; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr.row-sentinel { background: var(--row-sentinel); }
  tbody tr.row-guide    { background: var(--row-guide); box-shadow: inset 0 0 0 1px var(--border); }
  tbody tr { border-radius: 10px; transition: filter .15s, transform .15s; }
  tbody tr:hover { filter: brightness(1.08); transform: translateX(3px); }

  td { padding: 12px 14px; font-size: 0.87rem; white-space: nowrap; }
  td:first-child { border-radius: 10px 0 0 10px; }
  td:last-child  { border-radius: 0 10px 10px 0; }

  .row-sentinel .text-main { color: #e8dfd0; }
  .row-sentinel .text-sub  { color: #a09080; }
  .row-guide    .text-main { color: var(--text); }
  .row-guide    .text-sub  { color: var(--text-mid); }

  /* ── 등급 배지 ── */
  .grade-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 20px; border-radius: 4px;
    font-size: 0.72rem; font-weight: 800; letter-spacing: .03em;
  }
  /* 센티넬 행 (어두운 배경) */
  .row-sentinel .grade-SS { background: rgba(192,57,43,.28);  color: #e88070; border: 1px solid rgba(192,57,43,.5); }
  .row-sentinel .grade-S  { background: rgba(184,134,11,.28); color: #d4a830; border: 1px solid rgba(184,134,11,.5); }
  .row-sentinel .grade-A  { background: rgba(36,113,163,.28); color: #6ab0e0; border: 1px solid rgba(36,113,163,.5); }
  .row-sentinel .grade-C  { background: rgba(30,132,73,.28);  color: #60c080; border: 1px solid rgba(30,132,73,.5); }
  /* 가이드 행 (밝은 배경) */
  .row-guide .grade-SS { background: rgba(192,57,43,.12);  color: var(--grade-ss); border: 1px solid rgba(192,57,43,.3); }
  .row-guide .grade-S  { background: rgba(184,134,11,.12); color: var(--grade-s);  border: 1px solid rgba(184,134,11,.3); }
  .row-guide .grade-A  { background: rgba(36,113,163,.12); color: var(--grade-a);  border: 1px solid rgba(36,113,163,.3); }
  .row-guide .grade-C  { background: rgba(30,132,73,.12);  color: var(--grade-c);  border: 1px solid rgba(30,132,73,.3); }

  /* ── 소속 태그 ── */
  .org-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: .02em;
  }

  /* 소속별 — 진한 배경 + 흰 글씨 (어느 행에서도 잘 보임) */
  .org-아크프리마      { background: #8b2218; color: #ffd0c8; }
  .org-뱅가드1팀       { background: #5c3a1e; color: #f0d8b8; }
  .org-뱅가드2팀       { background: #7a4820; color: #f5ddb0; }
  .org-하모니서포트부  { background: #1a5c42; color: #a8f0d0; }
  .org-하모니RST       { background: #1a3d5c; color: #a0d4f0; }
  .org-하모니코어팀    { background: #3d1a5c; color: #d0a8f0; }
  .org-에이전트        { background: #1a3070; color: #a8c4f8; }
  .org-애콜라이트      { background: #1a5c1a; color: #a8f0a8; }

  /* ── 속성 도트 ── */
  .attr-dot { display: inline-flex; align-items: center; gap: 7px; font-size: 0.83rem; font-weight: 500; }
  .attr-dot::before { content: ''; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .attr-불::before    { background: var(--attr-불);    box-shadow: 0 0 5px rgba(212,80,42,.6); }
  .attr-얼음::before  { background: var(--attr-얼음);  box-shadow: 0 0 5px rgba(46,139,181,.6); }
  .attr-풀::before    { background: var(--attr-풀);    box-shadow: 0 0 5px rgba(76,175,114,.6); }
  .attr-물::before    { background: var(--attr-물);    box-shadow: 0 0 5px rgba(58,143,181,.6); }
  .attr-번개::before  { background: var(--attr-번개);  box-shadow: 0 0 5px rgba(200,168,0,.6); }
  .attr-바람::before  { background: var(--attr-바람);  box-shadow: 0 0 5px rgba(46,158,106,.6); }
  .attr-무속성::before { background: var(--attr-무속성); }

  /* ── 키 ── */
  .height-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .height-val { font-variant-numeric: tabular-nums; font-size: 0.84rem; min-width: 42px; }
  .height-bar { width: 52px; height: 3px; background: rgba(255,255,255,.15); border-radius: 2px; overflow: hidden; }
  .row-guide .height-bar { background: rgba(0,0,0,.1); }
  .height-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; opacity: .7; }
  .row-sentinel .height-bar-fill { background: #c8bfb0; }

  .empty-row td { text-align: center; padding: 56px; color: var(--text-dim); font-size: 0.88rem; }

  /* ── 캐릭터 팝업 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,8,4,.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    border-radius: 18px;
    width: 440px;
    max-width: 92vw;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.7);
    animation: modalIn .22s cubic-bezier(.34,1.3,.64,1);
    /* 배경은 JS로 속성별 동적 설정 */
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(.9) translateY(12px); }
    to   { opacity:1; transform: scale(1)  translateY(0); }
  }

  /* 속성별 모달 테마 */
  /* 불 — 깊은 적흑 + 오렌지레드 */
  .modal[data-attr="불"]    { background: linear-gradient(145deg, #2e0800, #180400); border: 1px solid #8b2800; --m-accent:#ff6030; --m-quote:#ffaa70; --m-dim:#a04020; --m-card:rgba(255,80,30,.1); --m-card-border:rgba(255,80,30,.28); }
  /* 물 — 짙은 네이비 + 코발트블루 */
  .modal[data-attr="물"]    { background: linear-gradient(145deg, #00081e, #000410); border: 1px solid #0a2580; --m-accent:#4878f0; --m-quote:#88b0ff; --m-dim:#2848b0; --m-card:rgba(40,90,240,.1); --m-card-border:rgba(40,90,240,.28); }
  /* 얼음 — 차갑고 밝은 하늘색 계열 */
  .modal[data-attr="얼음"]  { background: linear-gradient(145deg, #001828, #000d1a); border: 1px solid #1878a8; --m-accent:#60d8ff; --m-quote:#c0f0ff; --m-dim:#3098b8; --m-card:rgba(80,210,255,.08); --m-card-border:rgba(80,210,255,.25); }
  /* 바람 — 어두운 청록 민트 */
  .modal[data-attr="바람"]  { background: linear-gradient(145deg, #001a16, #000d0b); border: 1px solid #0a5848; --m-accent:#20e0b8; --m-quote:#70fce0; --m-dim:#109878; --m-card:rgba(20,210,170,.08); --m-card-border:rgba(20,210,170,.25); }
  /* 풀 — 어두운 황록 */
  .modal[data-attr="풀"]    { background: linear-gradient(145deg, #101e00, #080f00); border: 1px solid #386800; --m-accent:#98e030; --m-quote:#c8f870; --m-dim:#689010; --m-card:rgba(140,220,30,.08); --m-card-border:rgba(140,220,30,.25); }
  /* 번개 — 어두운 황갈 + 노랑 */
  .modal[data-attr="번개"]  { background: linear-gradient(145deg, #1c1600, #0e0b00); border: 1px solid #686000; --m-accent:#f8d020; --m-quote:#ffee80; --m-dim:#b89010; --m-card:rgba(240,190,0,.08); --m-card-border:rgba(240,190,0,.25); }
  /* 무속성 — 차갑고 무채색 */
  .modal[data-attr="무속성"]{ background: linear-gradient(145deg, #141414, #090909); border: 1px solid #484848; --m-accent:#d8d8d8; --m-quote:#f4f4f4; --m-dim:#909090; --m-card:rgba(210,210,210,.07); --m-card-border:rgba(210,210,210,.2); }

  .modal-header {
    padding: 28px 28px 20px;
    display: flex; align-items: flex-start; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .modal-header-left { display: flex; flex-direction: column; gap: 10px; }
  .modal-name {
    font-size: 1.7rem; font-weight: 900;
    letter-spacing: -.03em;
    color: var(--m-accent);
    text-shadow: 0 0 30px currentColor;
  }
  .modal-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .modal-close {
    background: rgba(255,255,255,.07); border: none; cursor: pointer;
    color: rgba(255,255,255,.4); font-size: 1rem; line-height: 1;
    padding: 6px 9px; border-radius: 8px; transition: all .15s; flex-shrink: 0;
  }
  .modal-close:hover { color: #fff; background: rgba(255,255,255,.15); }

  .modal-body { padding: 22px 28px 28px; display: flex; flex-direction: column; gap: 18px; }

  .modal-quote {
    font-size: 1.05rem; font-weight: 600; font-style: italic;
    color: var(--m-quote);
    line-height: 1.65;
    padding-left: 16px;
    border-left: 3px solid var(--m-accent);
  }

  .modal-catchphrase-label {
    font-size: 0.66rem; text-transform: uppercase; letter-spacing: .12em;
    color: var(--m-dim); margin-bottom: 8px;
  }
  .modal-catchphrase {
    font-size: 0.87rem; color: rgba(255,255,255,.65); line-height: 1.75;
    background: var(--m-card);
    border: 1px solid var(--m-card-border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  /* 모달 안 배지 */
  .modal .grade-badge { font-size: 0.76rem; }
  .modal .grade-badge.grade-SS { background: rgba(220,60,40,.3);  color: #ff9080; border-color: rgba(220,60,40,.6); }
  .modal .grade-badge.grade-S  { background: rgba(200,150,10,.3); color: #ffd050; border-color: rgba(200,150,10,.6); }
  .modal .grade-badge.grade-A  { background: rgba(50,120,210,.3); color: #80c0ff; border-color: rgba(50,120,210,.6); }
  .modal .grade-badge.grade-C  { background: rgba(60,180,80,.3);  color: #80f0a0; border-color: rgba(60,180,80,.6); }
  .modal .attr-dot { color: var(--m-accent); }

  tbody tr.has-profile { cursor: pointer; }

    header, .controls, .table-wrap { padding-left: 16px; padding-right: 16px; }
    .header-title { font-size: 1.5rem; }
    td { padding: 10px 9px; font-size: 0.78rem; }
    .height-bar { display: none; }
    .legend { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">캐릭터 <span>로스터</span></div>
    <div class="header-count" id="headerCount"></div>
  </div>
</header>

<div class="controls">
  <!-- 검색 -->
  <div class="search-wrap">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="이름 검색…">
  </div>

  <div class="divider"></div>
  <span class="filter-label">등급</span>
  <div class="filter-group" id="gradeFilter">
    <button class="chip active" data-grade="ALL">전체</button>
    <button class="chip" data-grade="SS">SS</button>
    <button class="chip" data-grade="S">S</button>
    <button class="chip" data-grade="A">A</button>
    <button class="chip" data-grade="C">C</button>
  </div>

  <div class="divider"></div>
  <span class="filter-label">소속</span>
  <div class="filter-group" id="orgFilter">
    <button class="chip active" data-org="ALL">전체</button>
    <button class="chip" data-org="아크프리마">아크프리마</button>
    <button class="chip" data-org="뱅가드1팀">뱅가드 1팀</button>
    <button class="chip" data-org="뱅가드2팀">뱅가드 2팀</button>
    <button class="chip" data-org="하모니서포트부">하모니 서포트부</button>
    <button class="chip" data-org="하모니RST">하모니 R.S.T.</button>
    <button class="chip" data-org="하모니코어팀">하모니 코어팀</button>
    <button class="chip" data-org="에이전트">에이전트</button>
    <button class="chip" data-org="애콜라이트">애콜라이트</button>
  </div>

  <div class="divider"></div>
  <span class="filter-label">속성</span>
  <div class="filter-group" id="attrFilter">
    <button class="chip active" data-attr="ALL">전체</button>
    <button class="chip" data-attr="불">🔥 불</button>
    <button class="chip" data-attr="얼음">❄️ 얼음</button>
    <button class="chip" data-attr="물">💧 물</button>
    <button class="chip" data-attr="바람">🌀 바람</button>
    <button class="chip" data-attr="번개">⚡ 번개</button>
    <button class="chip" data-attr="풀">🌿 풀</button>
    <button class="chip" data-attr="무속성">○ 무속성</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch sentinel"></div>센티넬</div>
    <div class="legend-item"><div class="legend-swatch guide"></div>가이드</div>
  </div>
</div>

<div class="table-wrap">
  <div class="result-count" id="resultCount"></div>
  <table>
    <thead>
      <tr>
        <th data-sort="grade">등급 <span class="sort-icon">↕</span></th>
        <th data-sort="name">이름 <span class="sort-icon">↕</span></th>
        <th data-sort="org">소속 <span class="sort-icon">↕</span></th>

const GRADE_ORDER = {SS:0, S:1, A:2, B:3, C:4};
const ORG_ORDER = {"아크프리마":0,"뱅가드1팀":1,"뱅가드2팀":2,"하모니서포트부":3,"하모니RST":4,"하모니코어팀":5,"에이전트":6,"애콜라이트":7};
const ORG_LABEL = {
  "아크프리마":"아크프리마",
  "뱅가드1팀":"뱅가드 1팀",
  "뱅가드2팀":"뱅가드 2팀",
  "하모니서포트부":"하모니 서포트부",
  "하모니RST":"하모니 R.S.T.",
  "하모니코어팀":"하모니 코어팀",
  "에이전트":"에이전트",
  "애콜라이트":"애콜라이트"
};
const MIN_H = 155, MAX_H = 195;

let sortKey = 'grade', sortAsc = true;
let filterGrade = 'ALL', filterOrg = 'ALL', filterAttr = 'ALL', searchQ = '';

function getFiltered() {
  return CHARACTERS.filter(c => {
    if (filterGrade !== 'ALL' && c.grade !== filterGrade) return false;
    if (filterOrg   !== 'ALL' && c.org   !== filterOrg)  return false;
    if (filterAttr  !== 'ALL' && c.attr  !== filterAttr)  return false;
    if (searchQ && !c.name.includes(searchQ)) return false;
    return true;
  }).sort((a, b) => {
    let va, vb;
    if      (sortKey === 'grade')  { va = GRADE_ORDER[a.grade]; vb = GRADE_ORDER[b.grade]; }
    else if (sortKey === 'name')   { va = a.name;   vb = b.name; }
    else if (sortKey === 'org')    { va = ORG_ORDER[a.org]; vb = ORG_ORDER[b.org]; }
    else if (sortKey === 'attr')   { va = a.attr;   vb = b.attr; }
    else if (sortKey === 'age')    { va = a.age;    vb = b.age; }
    else if (sortKey === 'height') { va = a.height; vb = b.height; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });
}

function render() {
  const data = getFiltered();
  document.getElementById('headerCount').textContent = `총 ${CHARACTERS.length}명`;
  document.getElementById('resultCount').innerHTML = `<span>${data.length}</span>명의 캐릭터`;

  const tbody = document.getElementById('tableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">조건에 맞는 캐릭터가 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(c => {
    const pct = Math.round(((c.height - MIN_H) / (MAX_H - MIN_H)) * 100);
    const rowCls = c.role === '센티넬' ? 'row-sentinel' : 'row-guide';
    const orgKey = c.org.replace(/\s/g,'');
    const hasProfile = !!(c.quote || c.catchphrase);
    return `
    <tr class="${rowCls}${hasProfile ? ' has-profile' : ''}" data-name="${c.name}">
      <td><span class="grade-badge grade-${c.grade}">${c.grade}</span></td>
      <td class="text-main" style="font-weight:700;font-size:.92rem">${c.name}</td>
      <td><span class="org-tag org-${orgKey}">${ORG_LABEL[c.org]}</span></td>
      <td><span class="attr-dot attr-${c.attr} text-sub">${c.attr}</span></td>
      <td class="text-sub">${c.age}</td>
      <td>
        <div class="height-bar-wrap">
          <span class="height-val text-sub">${c.height}</span>
          <div class="height-bar"><div class="height-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
    render();
  });
});

document.getElementById('gradeFilter').addEventListener('click', e => {
  const btn = e.target.closest('.chip[data-grade]');
  if (!btn) return;
  document.querySelectorAll('#gradeFilter .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterGrade = btn.dataset.grade;
  render();
});

document.getElementById('orgFilter').addEventListener('click', e => {
  const btn = e.target.closest('.chip[data-org]');
  if (!btn) return;
  document.querySelectorAll('#orgFilter .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterOrg = btn.dataset.org;
  render();
});

document.getElementById('attrFilter').addEventListener('click', e => {
  const btn = e.target.closest('.chip[data-attr]');
  if (!btn) return;
  document.querySelectorAll('#attrFilter .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAttr = btn.dataset.attr;
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});
const overlay  = document.getElementById('modalOverlay');
const modalEl  = document.getElementById('modal');

function openModal(c) {
  document.getElementById('modalName').textContent = c.name;
  document.getElementById('modalQuote').textContent = `"${c.quote}"`;
  document.getElementById('modalCatchphrase').textContent = c.catchphrase;

  const orgKey = c.org.replace(/\s/g,'');
  document.getElementById('modalMeta').innerHTML = `
    <span class="grade-badge grade-${c.grade}">${c.grade}</span>
    <span class="org-tag org-${orgKey}" style="font-size:.72rem">${ORG_LABEL[c.org]}</span>
    <span class="attr-dot attr-${c.attr}" style="font-size:.8rem">${c.attr}</span>
  `;
  modalEl.setAttribute('data-attr', c.attr);
  overlay.classList.add('open');
}

document.getElementById('tableBody').addEventListener('click', e => {
  const tr = e.target.closest('tr.has-profile');
  if (!tr) return;
  const name = tr.dataset.name;
  const c = CHARACTERS.find(x => x.name === name);
  if (c) openModal(c);
});

document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });


render();
</script>
</body>
</html>
